<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found | William Ortiz</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/pages.css">
</head>
<body>
    <nav aria-label="Primary navigation" id="navbar" class="scrolled">
        <div class="container nav-container">
            <a href="/" class="nav-logo" aria-label="William Ortiz - Home">
                <span class="logo-bracket">{</span>WO<span class="logo-bracket">}</span>
            </a>
        </div>
    </nav>

    <main id="main-content">
        <div class="error-page">
            <div class="container">
                <p class="error-code" aria-hidden="true">404</p>
                <h1>Page Not Found</h1>
                <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
                <div class="error-terminal" aria-hidden="true">
                    <div class="terminal-bar">
                        <span class="terminal-dot"></span>
                        <span class="terminal-dot"></span>
                        <span class="terminal-dot"></span>
                    </div>
                    <div class="terminal-body">
                        <p><span class="terminal-prompt">$</span> curl -I williamortiz.dev<span class="terminal-path"></span></p>
                        <p class="terminal-response">HTTP/1.1 404 Not Found</p>
                        <p><span class="terminal-prompt">$</span> <span class="terminal-cursor">_</span></p>
                    </div>
                </div>
                <a href="/" class="btn btn-primary">Back to Home</a>
            </div>
        </div>
    </main>

    <footer role="contentinfo">
        <div class="container footer-container">
            <p>&copy; <span id="current-year"></span> William Ortiz.</p>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found | William Ortiz</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/pages.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <nav aria-label="Primary navigation" id="navbar" class="scrolled">
        <div class="container nav-container">
            <a href="/" class="nav-logo" aria-label="William Ortiz - Home">
                <span class="logo-bracket">{</span>WO<span class="logo-bracket">}</span>
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-links">
                <span class="hamburger" aria-hidden="true"></span>
            </button>
            <ul class="nav-links" id="nav-links" role="list">
                <li><a href="/#about">About</a></li>
                <li><a href="/#projects">Projects</a></li>
                <li><a href="/#skills">Skills</a></li>
                <li><a href="/#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main id="main-content">
        <div class="error-page">
            <div class="container">
                <p class="error-code" aria-hidden="true">404</p>
                <h1>Page Not Found</h1>
                <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
                <div class="error-terminal" aria-hidden="true">
                    <div class="terminal-bar">
                        <span class="terminal-dot"></span>
                        <span class="terminal-dot"></span>
                        <span class="terminal-dot"></span>
                    </div>
                    <div class="terminal-body">
                        <p><span class="terminal-prompt">$</span> curl -I williamortiz.dev<span class="terminal-path"></span></p>
                        <p class="terminal-response">HTTP/1.1 404 Not Found</p>
                        <p><span class="terminal-prompt">$</span> <span class="terminal-cursor">_</span></p>
                    </div>
                </div>
                <a href="/" class="btn btn-primary">Back to Home</a>
            </div>
        </div>
    </main>

    <footer role="contentinfo">
        <div class="container footer-container">
            <p>&copy; <span id="current-year"></span> William Ortiz. Built with purpose.</p>
            <div class="footer-middle">
                <nav aria-label="Legal">
                    <a href="/privacy.html">Privacy</a>
                    <a href="/terms.html">Terms</a>
                </nav>
            </div>
            <div class="footer-social" aria-label="Social media links">
                <a href="mailto:contact@williamortiz.dev" aria-label="Send email"><i data-feather="mail" aria-hidden="true"></i></a>
                <a href="https://github.com/WilliamOrtizDev" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i data-feather="github" aria-hidden="true"></i></a>
                <a href="https://www.linkedin.com/in/williamortizdev/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i data-feather="linkedin" aria-hidden="true"></i></a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
        feather.replace({ 'stroke-width': 2 });

        var navToggle = document.getElementById('nav-toggle');
        var navLinks = document.getElementById('nav-links');
        navToggle.addEventListener('click', function () {
            var expanded = navToggle.getAttribute('aria-expanded') === 'true';
            navToggle.setAttribute('aria-expanded', String(!expanded));
            navToggle.setAttribute('aria-label', expanded ? 'Open navigation menu' : 'Close navigation menu');
            navLinks.classList.toggle('active');
            document.body.classList.toggle('nav-open');
        });
        navLinks.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
                navLinks.classList.remove('active');
                navToggle.setAttribute('aria-expanded', 'false');
                document.body.classList.remove('nav-open');
            });
        });
    </script>
</body>
</html>
